name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        echo "=== Installing dependencies ==="
        npm ci || npm install
        echo "=== Dependencies installed ==="
        ls -la node_modules/.bin/ | head -20
    
    - name: Build frontend
      run: |
        echo "=== Building frontend ==="
        npm run build
        echo "=== Build completed ==="
        ls -la dist/
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Verify Gradle files
      run: |
        echo "=== Checking Android directory ==="
        ls -la android/
        echo "=== Checking gradlew ==="
        ls -la android/gradlew
        echo "=== Gradle version ==="
        cd android && chmod +x gradlew && ./gradlew --version
    
    - name: Sync Capacitor
      run: |
        echo "=== Syncing Capacitor ==="
        npx cap sync android
        echo "=== Sync completed ==="
        ls -la android/app/src/main/assets/
    
    - name: Build Debug APK
      run: |
        echo "=== Building APK ==="
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --warning-mode all
        echo "=== APK Build completed ==="
        ls -la app/build/outputs/apk/debug/
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
    
    - name: Upload full build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          android/app/build/outputs/
          dist/
        retention-days: 7
    
    - name: List all outputs
      if: always()
      run: |
        echo "=== Final build outputs ==="
        find android/app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "No APK found"
